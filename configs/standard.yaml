# SD 1.4 emulation config — intended target is a single H100 80GB due to budget.
#
# Local validation: use configs/smoke.yaml - standard.yaml will OOM on consumer GPUs.
# Unless you have a data center in your garage :)

latents_path: scripts/latents

model:
  in_channels: 4
  out_channels: 4
  channels: 320
  n_res: 2
  channel_mults: [1, 2, 4, 4]
  attention_levels: [0, 1, 2]
  n_heads: 8
  tf_layers: 1
  d_cond: 512

training:
  epochs: 1000            # effectively unbounded; max_steps is the real stop
  max_steps: 200000       # raise for a longer run
  batch_size: 64          # micro-batch on H100
  grad_accum_steps: 4     # effective batch size 256 (SD1.4 used ~2048 across many GPUs)
  num_workers: 8
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-2
  warmup_steps: 10000
  grad_clip: 1.0

  precision: bf16         # H100 native, no GradScaler needed, more headroom than fp16
  compile: reduce-overhead  # torch.compile mode

  ema: true
  ema_decay: 0.9999
  ema_device: cuda        # plenty of VRAM on H100; keep EMA on-GPU for speed

  cfg_dropout: 0.1        # classifier-free-guidance training: 10% null conds

  diffusion_steps: 1000
  beta_schedule: scaled_linear

  log_interval: 50
  save_interval: 2000     # set more frequently since we use an interruptible instance
