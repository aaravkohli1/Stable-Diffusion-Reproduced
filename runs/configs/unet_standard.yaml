model:
  in_channels: 4
  out_channels: 4
  channels: 64
  n_res: 4
  channel_mults: [1,2,4,4]
  attention_levels: [0,1,2,3]
  n_heads: 4
latents_path: "../latent_cache"
training:
  lr: 0.0001
  batch_size: 4
  epochs: 1
  diffusion_steps: 1000
  beta_schedule: cosine
  log_interval: 1
  save_interval: 1